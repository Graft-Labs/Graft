rules:
  - id: shipguard.monetization.price-from-client
    message: >
      Payment amount or price ID read from the request body and passed directly
      to the payment API. Never trust client-supplied prices — a user can modify
      the request to charge $0.01 instead of $99. Always look up the price from
      your own database or hardcoded config server-side, based on a safe
      identifier like a plan slug.
    languages: [js, ts]
    severity: ERROR
    metadata:
      guard: monetization
      category: checkout
      confidence: confirmed
      cwe: CWE-20
      owasp: A04:2021
    patterns:
      - pattern-either:
          # amount from body → payment call
          - pattern: |
              const { $AMOUNT } = req.body
              ...
              stripe.paymentIntents.create({ ..., amount: $AMOUNT, ... })
          - pattern: |
              const { $AMOUNT } = await req.json()
              ...
              stripe.paymentIntents.create({ ..., amount: $AMOUNT, ... })
          # priceId from body → checkout session
          - pattern: |
              const { $PRICE } = req.body
              ...
              stripe.checkout.sessions.create({ ..., price: $PRICE, ... })
          - pattern: |
              const { $PRICE } = await req.json()
              ...
              stripe.checkout.sessions.create({ ..., price: $PRICE, ... })
          - pattern: |
              const { $PRICE } = req.body
              ...
              stripe.checkout.sessions.create({ ..., price_data: { unit_amount: $PRICE, ... }, ... })
          # Generic: any field named amount/price/priceId from body
          - pattern: |
              req.body.$FIELD
          - pattern: |
              body.$FIELD
      - metavariable-regex:
          metavariable: $FIELD
          regex: (?i)^(amount|price|price_id|priceId|unit_amount|unitAmount|cost|total)$
