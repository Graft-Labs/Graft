rules:
  - id: shipguard.monetization.nextjs-webhook-body-parser
    message: >
      Next.js API routes parse the request body by default, which consumes the
      raw bytes that Stripe (and other payment providers) need to verify the
      webhook signature. You must disable the body parser for webhook routes:
      export const config = { api: { bodyParser: false } }. Without this,
      stripe.webhooks.constructEvent() will always throw a signature mismatch
      error, forcing you to skip verification or silently accept all events.
    languages: [js, ts]
    severity: ERROR
    metadata:
      guard: monetization
      category: webhooks
      confidence: confirmed
      cwe: CWE-345
      owasp: A08:2021
    patterns:
      - pattern-either:
          - pattern: |
              stripe.webhooks.constructEvent(...)
          - pattern: |
              stripe.webhooks.constructEventAsync(...)
      - pattern-not-inside: |
          ...
          bodyParser: false
          ...
    paths:
      include:
        - "pages/api/**"
