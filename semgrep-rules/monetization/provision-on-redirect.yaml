rules:
  - id: shipguard.monetization.provision-on-redirect
    message: >
      Subscription provisioning triggered from a ?session_id= or ?checkout_id=
      query parameter in a success redirect URL. This is a critical revenue bypass:
      anyone who knows the URL pattern can call this endpoint with a fabricated
      session ID and get free access. Provision access exclusively inside your
      webhook handler after verifying the payment event signature, never on the
      success page redirect.
    languages: [js, ts, tsx, jsx]
    severity: ERROR
    metadata:
      guard: monetization
      category: checkout
      confidence: confirmed
      cwe: CWE-639
      owasp: A01:2021
    patterns:
      - pattern-either:
          - pattern: |
              searchParams.get("session_id")
          - pattern: |
              req.query.session_id
          - pattern: |
              query.session_id
          - pattern: |
              params.session_id
          - pattern: |
              searchParams.get("checkout_id")
          - pattern: |
              req.query.checkout_id
      - pattern-inside: |
          ...
          $PROVISION(...)
          ...
      - metavariable-regex:
          metavariable: $PROVISION
          regex: >-
            (?i)(activat|subscrib|provision|upgrade|unlock|grant|enable|creat.*
            subscription|add.*credit|update.*plan|set.*plan|mark.*paid|
            fulfill|complete.*order)
