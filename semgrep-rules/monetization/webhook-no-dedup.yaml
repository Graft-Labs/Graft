rules:
  - id: shipguard.monetization.webhook-no-dedup
    message: >
      This webhook handler processes events without deduplicating by event ID.
      Payment webhooks are delivered at-least-once — the same "payment_succeeded"
      event can arrive multiple times. Without deduplication (e.g. storing the
      event ID in a database and checking it on each request), you risk charging
      customers twice, double-provisioning seats, or double-crediting referrals.
      Store and check the event ID (e.g. Stripe's evt_xxx) before processing.
    languages: [js, ts]
    severity: ERROR
    metadata:
      guard: monetization
      category: webhooks
      confidence: likely
      cwe: CWE-691
      owasp: A08:2021
    patterns:
      - pattern-either:
          - pattern: |
              stripe.webhooks.constructEvent(...)
          - pattern: |
              stripe.webhooks.constructEventAsync(...)
          - pattern: |
              paddle.webhooks.unmarshal(...)
          - pattern: |
              wh.verify(...)
      - pattern-not-inside: |
          ...
          eventId
          ...
      - pattern-not-inside: |
          ...
          idempotency
          ...
      - pattern-not-inside: |
          ...
          processed_events
          ...
      - pattern-not-inside: |
          ...
          event.id
          ...
