rules:
  - id: shipguard.monetization.float-money-arithmetic
    message: >
      Floating-point arithmetic on a price or monetary amount. Floats cannot
      represent all decimal values exactly (e.g. 0.1 + 0.2 = 0.30000000000000004).
      This causes rounding errors that under- or over-charge customers and cause
      accounting discrepancies. Always store and compute money in integer cents
      (e.g. $9.99 = 999 cents) and only convert to decimal for display.
    languages: [js, ts]
    severity: WARNING
    metadata:
      guard: monetization
      category: checkout
      confidence: likely
      cwe: CWE-681
      owasp: A04:2021
    patterns:
      - pattern-either:
          - pattern: |
              $PRICE * $RATE
          - pattern: |
              $PRICE / $DIVISOR
          - pattern: |
              $PRICE + $FEE
          - pattern: |
              $PRICE - $DISCOUNT
          - pattern: |
              parseFloat($STR)
      - metavariable-regex:
          metavariable: $PRICE
          regex: (?i)(price|amount|cost|total|subtotal|fee|charge|revenue)
