rules:
  - id: shipguard.security.cors-wildcard-credentials
    message: >
      CORS is configured with a wildcard origin ("*") AND credentials:true.
      Browsers block this combination per the CORS spec — but some frameworks
      silently allow it, and it lets any website make authenticated requests to
      your API on behalf of a logged-in user (CSRF-like attack). Set a specific
      allow-list of origins instead of "*" when using credentials.
    languages: [js, ts]
    severity: ERROR
    metadata:
      guard: security
      category: cors
      confidence: confirmed
      cwe: CWE-942
      owasp: A05:2021
    patterns:
      - pattern-either:
          - pattern: |
              cors({ ..., origin: "*", ..., credentials: true, ... })
          - pattern: |
              cors({ ..., credentials: true, ..., origin: "*", ... })
          - pattern: |
              res.setHeader("Access-Control-Allow-Origin", "*")
              ...
              res.setHeader("Access-Control-Allow-Credentials", "true")
          - pattern: |
              res.setHeader("Access-Control-Allow-Credentials", "true")
              ...
              res.setHeader("Access-Control-Allow-Origin", "*")

  - id: shipguard.security.nextjs-cors-wildcard
    message: >
      This Next.js API route sets Access-Control-Allow-Origin to "*" with
      credentials allowed. This is a CORS misconfiguration that exposes your
      API to cross-origin attacks.
    languages: [js, ts]
    severity: ERROR
    metadata:
      guard: security
      category: cors
      confidence: confirmed
      cwe: CWE-942
      owasp: A05:2021
    patterns:
      - pattern: |
          headers: {
            ...,
            "Access-Control-Allow-Origin": "*",
            ...,
            "Access-Control-Allow-Credentials": "true",
            ...
          }
