rules:
  - id: multi-tenant-query-no-tenant-filter
    message: >
      DB query on a shared SaaS table without a tenant/org/workspace filter.
      In multi-tenant apps every query on tables like 'subscriptions',
      'organizations', 'workspaces', 'teams', 'members', or 'memberships'
      must include a scoping filter (tenant_id, org_id, workspace_id, user_id,
      etc.) to prevent cross-tenant data leaks.
    severity: WARNING
    metadata:
      cwe: CWE-284
      category: security
      confidence: LOW
      technology:
        - typescript
        - javascript
    languages:
      - typescript
      - javascript
    patterns:
      # Match .from("subscriptions") / .from('organizations') etc.
      - pattern: $OBJ.from("$TABLE")
      - metavariable-regex:
          metavariable: $TABLE
          regex: ^(subscriptions|organizations|workspaces|teams|accounts|members|memberships)$
      # Require that the result is NOT filtered by a tenant ID
      - pattern-not: $OBJ.from("$TABLE").$FILTER(...)
    paths:
      exclude:
        - "**/node_modules/**"
        - "**/*.test.*"
        - "**/*.spec.*"
        - "**/migrations/**"
        - "**/seed*"
        - "**/fixtures/**"
        - "**/scripts/**"
        - "**/admin/**"
