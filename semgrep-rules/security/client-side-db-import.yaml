rules:
  - id: shipguard.security.client-side-db-import
    patterns:
      - pattern: |
          import $X from "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ^(drizzle-orm|@neondatabase/serverless|@prisma/client|@planetscale/database|@libsql/client|@turso/client)
      - path:
          regex: ^src/
    message: >
      Database client `$PKG` is imported in `src/` — code that runs in the browser.
      Any user can open DevTools and execute arbitrary database queries using your
      production credentials. Move ALL database access to server-side API routes or
      server actions under `app/api/` or `src/server/`.
    languages: [typescript, javascript]
    severity: ERROR
    metadata:
      guard: security
      category: secrets
      confidence: confirmed
