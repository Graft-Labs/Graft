rules:
  - id: shipguard.security.next-public-secret
    message: >
      NEXT_PUBLIC_ prefix exposes this variable to the browser bundle. Never use
      NEXT_PUBLIC_ for secrets such as API keys, service-role keys, or database
      passwords — they will be readable by anyone who views the page source.
    languages: [js, ts, tsx, jsx]
    severity: ERROR
    metadata:
      guard: security
      category: secrets
      confidence: confirmed
      cwe: CWE-312
      owasp: A02:2021
    patterns:
      - pattern: |
          process.env.NEXT_PUBLIC_$KEY
      - metavariable-regex:
          metavariable: $KEY
          regex: >-
            (?i)(secret|key|token|password|passwd|pwd|api_key|apikey|service_role|
            private|auth|credential|cred|signing|webhook|stripe|openai|anthropic|
            supabase_service|db_pass|database_url|jwt_secret|encryption)

  - id: shipguard.security.next-public-secret-env-file
    message: >
      This .env file sets a NEXT_PUBLIC_ variable whose name looks like a secret.
      Any value set as NEXT_PUBLIC_ is inlined into the browser bundle at build
      time and is publicly visible.
    languages: [generic]
    severity: ERROR
    metadata:
      guard: security
      category: secrets
      confidence: confirmed
      cwe: CWE-312
      owasp: A02:2021
    paths:
      include:
        - ".env*"
    patterns:
      - pattern: |
          NEXT_PUBLIC_$KEY=$VALUE
      - metavariable-regex:
          metavariable: $KEY
          regex: >-
            (?i)(secret|key|token|password|service_role|private|api_key|apikey|
            signing|webhook|stripe|openai|anthropic|jwt|encryption|credential)
