rules:
  - id: shipguard.security.hardcoded-live-stripe-key
    message: >
      Live Stripe key (sk_live_ or pk_live_) or webhook secret (whsec_) is
      hardcoded in source code. This key is fully functional and grants complete
      access to your Stripe account. Rotate it immediately and move to
      process.env.STRIPE_SECRET_KEY.
    languages: [js, ts]
    severity: ERROR
    metadata:
      guard: security
      category: secrets
      confidence: confirmed
      cwe: CWE-798
    patterns:
      - pattern-regex: '(sk_live_|pk_live_|rk_live_|whsec_)[a-zA-Z0-9]{20,}'
      - pattern-not-regex: 'process\.env\.'
      - pattern-not-regex: 'import\.meta\.env\.'
    paths:
      exclude:
        - "*.env"
        - "*.env.*"
        - "**/.env"
        - "**/.env.*"
        - "*.example"
        - "**/*.example"
        - "*.test.*"
        - "*.spec.*"
