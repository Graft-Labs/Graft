rules:
  - id: client-side-plan-gate
    message: >
      Plan/feature gate is enforced only in a client component ('use client').
      Client-side checks are trivially bypassable via DevTools — any user can
      toggle isPro, change plan to "pro", or delete the check. Real plan
      enforcement must happen server-side (API route, Server Action, middleware)
      where the user cannot tamper with the check.
    severity: WARNING
    metadata:
      cwe: CWE-602
      category: security
      confidence: LOW
      technology:
        - typescript
        - javascript
        - react
    languages:
      - typescript
      - javascript
    patterns:
      # Pattern 1: plan === 'pro' / plan === 'premium' etc. used in a JSX return
      - pattern: |
          if ($COND) {
            return null;
          }
      - metavariable-pattern:
          metavariable: $COND
          pattern-either:
            - pattern: $X.plan === "pro"
            - pattern: $X.plan === "premium"
            - pattern: $X.plan === "enterprise"
            - pattern: isPro
            - pattern: isPremium
            - pattern: isEnterprise
            - pattern: $X.subscription.status === "active"
    paths:
      include:
        - "**/*.tsx"
        - "**/*.jsx"
      exclude:
        - "**/node_modules/**"
        - "**/*.test.*"
        - "**/*.spec.*"
        - "**/api/**"
        - "**/server/**"
