rules:
  # setInterval without clearInterval in useEffect
  - id: shipguard.scalability.setinterval-no-cleanup
    patterns:
      - pattern: |
          useEffect(() => {
            ...
            setInterval($F, $N)
            ...
          }, ...)
      - pattern-not: |
          useEffect(() => {
            ...
            setInterval($F, $N)
            ...
            return $CLEANUP
          }, ...)
    message: >
      setInterval() inside useEffect without a cleanup function. On every
      component unmount/remount the old interval keeps running, causing memory
      leaks and duplicate callbacks. Return () => clearInterval(id) from useEffect.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      guard: scalability
      category: memory-leak
      confidence: likely

  # WebSocket opened without close
  - id: shipguard.scalability.websocket-no-close
    patterns:
      - pattern: |
          useEffect(() => {
            ...
            new WebSocket($URL)
            ...
          }, ...)
      - pattern-not: |
          useEffect(() => {
            ...
            new WebSocket($URL)
            ...
            return $CLEANUP
          }, ...)
    message: >
      WebSocket opened inside useEffect without a cleanup function. The connection
      stays open when the component unmounts — leaking connections and firing stale
      message handlers. Return () => ws.close() from useEffect.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      guard: scalability
      category: memory-leak
      confidence: likely
