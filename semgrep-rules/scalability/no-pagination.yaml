rules:
  - id: shipguard.scalability.findmany-no-pagination
    message: >
      Database query without a limit or pagination parameter. On a small dataset
      this seems fine, but as your data grows this will load thousands of rows
      into memory on every request, causing slow responses, high memory usage,
      and eventually timeouts. Always add take/limit/first/pageSize parameters
      to collection queries.
    languages: [js, ts]
    severity: WARNING
    metadata:
      guard: scalability
      category: database
      confidence: likely
      cwe: CWE-400
      owasp: A05:2021
    patterns:
      - pattern-either:
          - pattern: |
              $DB.findMany({})
          - pattern: |
              $DB.findMany({ where: $WHERE })
          - pattern: |
              $DB.findMany({ orderBy: $ORDER })
          - pattern: |
              $DB.findMany({ select: $SELECT })
          - pattern: |
              $DB.findMany({ include: $INCLUDE })
          - pattern: |
              $DB.findAll({})
          - pattern: |
              $DB.findAll({ where: $WHERE })
      - pattern-not: |
          $DB.findMany({ ..., take: ..., ... })
      - pattern-not: |
          $DB.findMany({ ..., limit: ..., ... })
      - pattern-not: |
          $DB.findMany({ ..., first: ..., ... })

  - id: shipguard.scalability.supabase-select-no-limit
    message: >
      Supabase query without .limit() or .range(). This fetches all matching rows
      into memory. Add .limit(n) or .range(from, to) to paginate results.
    languages: [js, ts]
    severity: WARNING
    metadata:
      guard: scalability
      category: database
      confidence: likely
      cwe: CWE-400
      owasp: A05:2021
    patterns:
      - pattern: |
          supabase.from($TABLE).select($COLS)
      - pattern-not: |
          supabase.from($TABLE).select($COLS).limit(...)
      - pattern-not: |
          supabase.from($TABLE).select($COLS).range(...)
